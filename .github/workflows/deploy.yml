name: CI/CD Production Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: jini-backend
  ECR_REPOSITORY_FRONTEND: jini-frontend
  ECR_REPOSITORY_WORKER: jini-worker
  EKS_CLUSTER_NAME: jini-prod-eks

jobs:
  audit-and-test:
    name: Run Unit Tests & Lint Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend & Run Tests
        run: |
          cd backend
          npm ci
          npx prisma generate
          npm run test -- --passWithNoTests

  build-and-push:
    name: Build & Push Images to ECR
    needs: audit-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest

      - name: Build and Push Worker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f ./infrastructure/docker/Dockerfile.worker -t $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WORKER:latest

      - name: Build and Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest

  deploy:
    name: Deploy to EKS Production Cluster
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig context
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Apply Kubernetes Manifests & Rolling Update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Apply manifest configurations
          kubectl apply -f infrastructure/k8s/
          
          # Rollout deployments with new container images
          kubectl set image deployment/jini-backend backend=123456789012.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG -n jini-prod
          kubectl set image deployment/jini-worker jini-worker=123456789012.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY_WORKER:$IMAGE_TAG -n jini-prod
          kubectl set image deployment/jini-frontend frontend=123456789012.dkr.ecr.us-east-1.amazonaws.com/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG -n jini-prod
          
          # Validate rollout status
          kubectl rollout status deployment/jini-backend -n jini-prod --timeout=300s
          kubectl rollout status deployment/jini-frontend -n jini-prod --timeout=300s
