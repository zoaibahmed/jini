apiVersion: apps/v1
kind: Deployment
metadata:
  name: jini-frontend
  labels:
    app: jini-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jini-frontend
  template:
    metadata:
      labels:
        app: jini-frontend
    spec:
      containers:
      - name: frontend
        image: jnisolutions/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: "500m"
            memory: 512Mi
          requests:
            cpu: "250m"
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: jini-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
