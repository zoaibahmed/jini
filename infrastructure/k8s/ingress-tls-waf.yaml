apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jini-ingress
  namespace: jini-prod
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # SSL/TLS configuration
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/abc12345-6789-abcd-ef01-234567890123
    # Security: Enable AWS WAFv2 regional integration
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-east-1:123456789012:regional/webacl/jini-prod-waf/abc12345-6789-abcd-ef01-234567890123
    # Health checks redirection
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
spec:
  rules:
    - host: api.jnisolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jini-backend-service
                port:
                  number: 5000
    - host: app.jnisolutions.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jini-frontend-service
                port:
                  number: 3000
