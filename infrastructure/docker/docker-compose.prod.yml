version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jini-prod-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jini_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jini_prod_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-jini_prod_db}
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jini_admin -d jini_prod_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jini-prod-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-jini_redis_secure_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: jini-prod-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-jini_admin}:${POSTGRES_PASSWORD:-jini_prod_secure_pass}@postgres:5432/${POSTGRES_DB:-jini_prod_db}?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-jini_redis_secure_pass}"
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_production_secret_key_1234567890}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfile.worker
    container_name: jini-prod-worker
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-jini_admin}:${POSTGRES_PASSWORD:-jini_prod_secure_pass}@postgres:5432/${POSTGRES_DB:-jini_prod_db}?schema=public"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-jini_redis_secure_pass}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: jini-prod-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:5000"
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pg_prod_data:
  redis_prod_data:
